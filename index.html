<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Sushil 🎉</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: 'Arial', sans-serif;
    background: linear-gradient(270deg, #ff9a9e, #fad0c4, #fbc2eb);
    background-size: 600% 600%;
    animation: gradientBG 10s ease infinite;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
}

/* Background animation */
@keyframes gradientBG {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

/* Image styling */
img {
    width: 250px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    animation: fadeIn 2s ease-in-out;
}

/* Text */
h1 {
    font-size: 40px;
    color: white;
    margin-top: 20px;
}

#message {
    font-size: 20px;
    color: white;
    width: 80%;
    max-width: 400px;
    margin-top: 10px;
    min-height: 60px;
}

/* Fade in */
@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}

/* Floating hearts */
.heart {
    position: absolute;
    color: red;
    font-size: 20px;
    animation: floatUp 5s linear infinite;
}

@keyframes floatUp {
    0% {
        bottom: -50px;
        opacity: 1;
    }
    100% {
        bottom: 100%;
        opacity: 0;
    }
}

.footer {
    margin-top: 20px;
    color: white;
    font-size: 18px;
}
</style>
</head>

<body>

<img src="sushil.jpeg" alt="Sushil">

<h1>🎉 Happy Birthday Sushil ❤️ 🎂</h1>

<div id="message"></div>

<div class="footer">— From Gargee ❤️</div>

<!-- Music -->
<audio autoplay loop>
  <source src="birthday.mp3" type="audio/mpeg">
</audio>

<script>
// Typing effect
const text = "You are my calm, my chaos, my happiness... I am so lucky to have you in my life 💖";
let i = 0;

function typeWriter() {
    if (i < text.length) {
        document.getElementById("message").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeWriter, 50);
    }
}

typeWriter();

// Floating hearts
function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * window.innerWidth + "px";
    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 5000);
}

setInterval(createHeart, 300);
</script>

</body>
</html>
